<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF/Excel Product Extractor</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; color: #333; }
        .header { background: #1a73e8; color: white; padding: 16px 24px; font-size: 20px; font-weight: 600; }
        .container { display: flex; height: calc(100vh - 56px); }
        .left-panel { width: 50%; border-right: 1px solid #ddd; display: flex; flex-direction: column; background: #fff; }
        .right-panel { width: 50%; display: flex; flex-direction: column; background: #fff; }
        .upload-area { padding: 20px; border-bottom: 1px solid #eee; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
        .btn { border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 500; }
        .btn:disabled { background: #ccc; cursor: not-allowed; }
        .btn-primary { background: #1a73e8; color: white; }
        .btn-primary:hover:not(:disabled) { background: #1557b0; }
        .btn-green { background: #34a853; color: white; }
        .btn-green:hover:not(:disabled) { background: #2d8e47; }
        .btn-orange { background: #ff9800; color: white; font-size: 13px; padding: 8px 16px; margin-left: auto; }
        .btn-orange:hover { background: #e68900; }
        .file-info { font-size: 13px; color: #666; }
        .pdf-viewer { flex: 1; overflow: hidden; }
        .pdf-viewer iframe { width: 100%; height: 100%; border: none; }
        .placeholder { display: flex; align-items: center; justify-content: center; height: 100%; color: #999; font-size: 16px; flex-direction: column; gap: 8px; }
        .extract-bar { padding: 16px 20px; border-bottom: 1px solid #eee; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
        .extract-bar label { font-size: 13px; color: #555; }
        .extract-bar input[type="number"] { width: 70px; padding: 6px 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 13px; }
        .extract-bar select, .extract-bar input[type="text"] { padding: 6px 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 13px; max-width: 260px; }
        .model-error { color: #d93025; font-size: 11px; }
        .result-area { flex: 1; overflow: auto; padding: 0; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { background: #f8f9fa; position: sticky; top: 0; z-index: 1; }
        th, td { padding: 8px 12px; border: 1px solid #e0e0e0; text-align: left; white-space: nowrap; }
        td { cursor: text; }
        td[contenteditable="true"]:focus { background: #fff8e1; outline: 2px solid #1a73e8; }
        tr:hover td { background: #f5f8ff; }
        .stats { padding: 8px 20px; background: #f8f9fa; border-top: 1px solid #eee; font-size: 12px; color: #666; }
        .progress-bar { height: 4px; background: #e0e0e0; border-radius: 2px; overflow: hidden; }
        .progress-fill { height: 100%; background: #1a73e8; transition: width 0.3s; }
        .progress-text { font-size: 12px; color: #666; margin-top: 4px; }
        .batch-error { color: #d93025; font-size: 12px; padding: 4px 12px; }
        .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid #ccc; border-top-color: #1a73e8; border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: middle; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .cost-display { font-size: 12px; color: #555; margin-top: 4px; }
        .cost-display .cost-value { font-weight: 600; color: #1a73e8; }
        .cost-display .cost-unknown { color: #999; font-style: italic; }
        .tab-bar { display: flex; border-bottom: 2px solid #e0e0e0; background: #f8f9fa; }
        .tab-btn { padding: 10px 24px; font-size: 14px; font-weight: 500; cursor: pointer; border: none; background: none; color: #666; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: color 0.2s, border-color 0.2s; }
        .tab-btn:hover { color: #1a73e8; }
        .tab-btn.active { color: #1a73e8; border-bottom-color: #1a73e8; }
        .tab-content { display: none; flex-direction: column; flex: 1; overflow: hidden; }
        .tab-content.active { display: flex; }
        .history-list { flex: 1; overflow-y: auto; padding: 12px 16px; }
        .history-empty { display: flex; align-items: center; justify-content: center; height: 100%; color: #999; font-size: 14px; }
        .history-item { padding: 12px 14px; border: 1px solid #e0e0e0; border-radius: 8px; margin-bottom: 8px; cursor: pointer; transition: background 0.15s, border-color 0.15s; }
        .history-item:hover { background: #f5f8ff; border-color: #1a73e8; }
        .history-item-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
        .history-item-filename { font-weight: 600; font-size: 13px; color: #333; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 280px; }
        .history-item-time { font-size: 11px; color: #999; }
        .history-item-meta { display: flex; gap: 12px; font-size: 12px; color: #666; align-items: center; flex-wrap: wrap; }
        .history-item-meta span { display: inline-flex; align-items: center; gap: 3px; }
        .history-action-btn { background: #ff9800; color: white; border: none; padding: 4px 10px; border-radius: 4px; font-size: 11px; cursor: pointer; margin-left: auto; white-space: nowrap; }
        .history-action-btn:hover { background: #e68900; }
        .excel-preview { overflow: auto; flex: 1; padding: 0; max-height: 100%; }
        .excel-preview table { border-collapse: collapse; font-size: 11px; table-layout: auto; }
        .excel-preview th, .excel-preview td { padding: 3px 6px; border: 1px solid #ccc; text-align: left; white-space: normal; word-break: break-word; max-width: 200px; }
        .excel-preview tr:nth-child(even) { background: #f9f9f9; }
        .excel-preview tr:hover td { background: #e8f0fe; }
    </style>
</head>
<body>
    <div class="header">📄 PDF/Excel Product Extractor</div>
    <div class="container">
        <div class="left-panel">
            <div class="upload-area">
                <input type="file" id="fileInput" accept=".pdf,.xlsx" hidden>
                <button class="btn btn-primary" onclick="document.getElementById('fileInput').click()">📁 Upload PDF/Excel</button>
                <span class="file-info" id="fileInfo">Chưa có file nào</span>
            </div>
            <div class="pdf-viewer" id="pdfViewer">
                <div class="placeholder">Upload file PDF/Excel để xem tại đây</div>
            </div>
        </div>
        <div class="right-panel">
            <div class="tab-bar">
                <button class="tab-btn active" onclick="switchTab('extract')">🔍 Trích xuất</button>
                <button class="tab-btn" onclick="switchTab('history')">📋 Lịch sử</button>
            </div>
            <div id="tabExtract" class="tab-content active">
                <div class="extract-bar">
                    <label id="lblStartPage">Từ trang:</label>
                    <input type="number" id="startPage" value="1" min="1">
                    <label id="lblEndPage">Đến trang:</label>
                    <input type="number" id="endPage" value="10" min="1">
                    <label id="lblBatch">Batch:</label>
                    <select id="batchSize">
                        <option value="5">5</option>
                        <option value="10" selected>10</option>
                        <option value="15">15</option>
                        <option value="20">20</option>
                    </select>
                    <label>Model:</label>
                    <span id="modelContainer">
                        <select id="modelSelect"><option value="">Đang tải...</option></select>
                    </span>
                    <button class="btn btn-green" id="extractBtn" onclick="startExtract()" disabled>🔍 Trích xuất</button>
                    <button class="btn btn-orange" id="downloadBtn" onclick="downloadExcel()" style="display:none">⬇ Tải Excel</button>
                    <button class="btn btn-primary" id="saveBtn" onclick="saveEdits()" style="display:none">💾 Lưu</button>
                </div>
                <div id="progressArea" style="padding: 8px 20px; display: none;">
                    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
                    <div class="progress-text" id="progressText"></div>
                    <div class="cost-display" id="costDisplay" style="display: none;">
                        💰 Chi phí: <span class="cost-value" id="costValue">$0.0000</span>
                        <span id="costTokens" style="margin-left: 8px; color: #888;"></span>
                    </div>
                </div>
                <div class="result-area" id="resultArea">
                    <div class="placeholder">Kết quả trích xuất sẽ hiển thị tại đây</div>
                </div>
                <div class="stats" id="stats"></div>
            </div>
            <div id="tabHistory" class="tab-content">
                <div class="history-list" id="historyList">
                    <div class="history-empty">Đang tải lịch sử...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const FIELDS = ["ma_san_pham", "ma_phu_kien", "ten_san_pham", "hinh_anh", "mo_ta_tinh_nang", "kich_thuoc", "thuong_hieu", "danh_muc", "don_vi", "thue_vat", "gia_niem_yet", "gia_mua_vao", "gia_ban_ra"];
        let currentFileId = null;
        let currentFilename = '';
        let currentFileType = 'pdf';
        let currentRecordId = null;
        let allRows = []; // array of arrays (each row = array of cell values)
        let headers = [];
        let totalPages = 0;
        let totalPromptTokens = 0;
        let totalCompletionTokens = 0;
        let totalCostUsd = 0;
        let costKnown = false;

        function formatCost(usd) { return '$' + usd.toFixed(4); }

        function updateCostDisplay(costUsd, promptTokens, completionTokens) {
            const d = document.getElementById('costDisplay');
            const v = document.getElementById('costValue');
            const t = document.getElementById('costTokens');
            d.style.display = 'block';
            v.textContent = formatCost(costUsd);
            v.className = 'cost-value';
            t.textContent = `(${promptTokens.toLocaleString()} prompt + ${completionTokens.toLocaleString()} completion tokens)`;
        }

        function showCostUnknown() {
            const d = document.getElementById('costDisplay');
            d.style.display = 'block';
            document.getElementById('costValue').textContent = 'Không xác định';
            document.getElementById('costValue').className = 'cost-value cost-unknown';
            document.getElementById('costTokens').textContent = '';
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        // Read table cells back into allRows
        function syncTableToData() {
            const tbody = document.getElementById('tableBody');
            if (!tbody) return;
            allRows = [];
            tbody.querySelectorAll('tr').forEach(tr => {
                const cells = tr.querySelectorAll('td[contenteditable]');
                const row = [];
                cells.forEach(td => row.push(td.textContent));
                if (row.length) allRows.push(row);
            });
        }

        // Convert current table data to JSON array of objects
        function buildJsonFromTable() {
            syncTableToData();
            return allRows.map(row => {
                const obj = {};
                headers.forEach((h, i) => { obj[h] = row[i] || ''; });
                return obj;
            });
        }

        // Render products (array of row arrays) into the result table
        function renderTable(hdrs, rows) {
            headers = hdrs;
            allRows = rows;
            const area = document.getElementById('resultArea');
            area.innerHTML = '<table id="resultTable"><thead><tr id="tableHead"></tr></thead><tbody id="tableBody"></tbody></table>';
            document.getElementById('tableHead').innerHTML = '<th>#</th>' + headers.map(h => `<th>${h}</th>`).join('');
            const tbody = document.getElementById('tableBody');
            rows.forEach((row, i) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `<td>${i + 1}</td>` + row.map((c, ci) => `<td contenteditable="true" data-row="${i}" data-col="${ci}">${escapeHtml(c)}</td>`).join('');
                tbody.appendChild(tr);
            });
        }

        async function loadModels() {
            const container = document.getElementById('modelContainer');
            try {
                const resp = await fetch('/models');
                if (!resp.ok) throw new Error('API error');
                const models = await resp.json();
                if (models.error) throw new Error(models.error);
                document.getElementById('modelSelect').innerHTML = models.map(m => `<option value="${m.id}">${m.name}</option>`).join('');
            } catch (err) {
                container.innerHTML = `<input type="text" id="modelInput" placeholder="anthropic/claude-sonnet-4" value="anthropic/claude-sonnet-4"><span class="model-error">⚠ Không tải được model</span>`;
            }
        }

        function getSelectedModel() {
            const s = document.getElementById('modelSelect');
            if (s) return s.value;
            const i = document.getElementById('modelInput');
            return i ? i.value.trim() : '';
        }

        function togglePageControls(fileType) {
            if (fileType === 'xlsx') {
                document.getElementById('lblStartPage').textContent = 'Từ hàng:';
                document.getElementById('lblEndPage').textContent = 'Đến hàng:';
            } else {
                document.getElementById('lblStartPage').textContent = 'Từ trang:';
                document.getElementById('lblEndPage').textContent = 'Đến trang:';
            }
        }

        async function renderExcelPreview(fileId) {
            const viewer = document.getElementById('pdfViewer');
            try {
                const resp = await fetch(`/xlsx/${fileId}`);
                if (!resp.ok) throw new Error('Fetch failed');
                const ab = await resp.arrayBuffer();
                const wb = XLSX.read(ab, { type: 'array' });
                const ws = wb.Sheets[wb.SheetNames[0]];
                const html = XLSX.utils.sheet_to_html(ws, { editable: false });
                viewer.innerHTML = '<div class="excel-preview">' + html + '</div>';
            } catch (err) {
                viewer.innerHTML = '<div class="placeholder">Không thể tải preview Excel</div>';
            }
        }

        loadModels();

        document.getElementById('fileInput').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const info = document.getElementById('fileInfo');
            info.textContent = `Đang upload ${file.name}...`;
            const fd = new FormData();
            fd.append('file', file);
            try {
                const resp = await fetch('/upload', { method: 'POST', body: fd });
                const data = await resp.json();
                if (data.error) { info.textContent = 'Upload thất bại: ' + data.error; return; }
                currentFileId = data.file_id;
                currentFilename = data.filename;
                currentFileType = data.file_type || 'pdf';
                document.getElementById('extractBtn').disabled = false;
                togglePageControls(currentFileType);

                if (currentFileType === 'xlsx') {
                    info.textContent = `${data.filename} — ${data.row_count} dòng dữ liệu`;
                    document.getElementById('endPage').value = data.row_count;
                    document.getElementById('endPage').max = data.row_count;
                    document.getElementById('startPage').max = data.row_count;
                    renderExcelPreview(data.file_id);
                } else {
                    totalPages = data.total_pages;
                    info.textContent = `${data.filename} — ${data.total_pages} trang`;
                    document.getElementById('endPage').value = data.total_pages;
                    document.getElementById('endPage').max = data.total_pages;
                    document.getElementById('startPage').max = data.total_pages;
                    document.getElementById('pdfViewer').innerHTML = `<iframe src="${data.pdf_url}"></iframe>`;
                }
            } catch (err) { info.textContent = 'Upload thất bại: ' + err.message; }
        });

        function startExtract() {
            if (!currentFileId) return;
            const btn = document.getElementById('extractBtn');
            const stats = document.getElementById('stats');
            const progressArea = document.getElementById('progressArea');

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> Đang xử lý...';
            allRows = []; headers = [];
            totalPromptTokens = 0; totalCompletionTokens = 0; totalCostUsd = 0; costKnown = false;
            document.getElementById('downloadBtn').style.display = 'none';
            document.getElementById('saveBtn').style.display = 'none';
            document.getElementById('costDisplay').style.display = 'none';
            stats.textContent = '';

            document.getElementById('resultArea').innerHTML = '<table id="resultTable"><thead><tr id="tableHead"></tr></thead><tbody id="tableBody"></tbody></table>';
            progressArea.style.display = 'block';
            document.getElementById('progressFill').style.width = '0%';
            document.getElementById('progressText').textContent = 'Bắt đầu xử lý...';

            let url;
            if (currentFileType === 'xlsx') {
                const startRow = parseInt(document.getElementById('startPage').value);
                const endRow = parseInt(document.getElementById('endPage').value);
                const batchSize = parseInt(document.getElementById('batchSize').value) || 100;
                url = `/extract-excel?file_id=${currentFileId}&start_row=${startRow}&end_row=${endRow}&batch_size=${batchSize}&model=${encodeURIComponent(getSelectedModel())}&filename=${encodeURIComponent(currentFilename)}`;
            } else {
                const startPage = parseInt(document.getElementById('startPage').value) - 1;
                const endPage = parseInt(document.getElementById('endPage').value);
                const batchSize = parseInt(document.getElementById('batchSize').value) || 10;
                url = `/extract?file_id=${currentFileId}&start_page=${startPage}&end_page=${endPage}&batch_size=${batchSize}&model=${encodeURIComponent(getSelectedModel())}&filename=${encodeURIComponent(currentFilename)}`;
            }
            const evtSource = new EventSource(url);

            evtSource.onmessage = (event) => {
                const data = JSON.parse(event.data);
                if (data.type === 'progress') {
                    document.getElementById('progressFill').style.width = Math.round((data.batch - 1) / data.total_batches * 100) + '%';
                    const detail = data.pages ? `Trang ${data.pages}` : `Mô tả ${data.descriptions}`;
                    document.getElementById('progressText').innerHTML = `<span class="spinner"></span> Batch ${data.batch}/${data.total_batches} — ${detail}`;
                }
                else if (data.type === 'batch') {
                    if (!headers.length && data.headers.length) {
                        headers = data.headers;
                        document.getElementById('tableHead').innerHTML = '<th>#</th>' + headers.map(h => `<th>${h}</th>`).join('');
                    }
                    const tbody = document.getElementById('tableBody');
                    data.rows.forEach(row => {
                        allRows.push(row);
                        const tr = document.createElement('tr');
                        // First cell is STT (from data or auto-increment)
                        const stt = row[0] || allRows.length;
                        tr.innerHTML = `<td>${stt}</td>` + row.slice(1).map((c, ci) => `<td contenteditable="true" data-row="${allRows.length-1}" data-col="${ci+1}">${escapeHtml(c)}</td>`).join('');
                        tbody.appendChild(tr);
                    });
                    if (data.cost) {
                        totalPromptTokens += data.cost.prompt_tokens || 0;
                        totalCompletionTokens += data.cost.completion_tokens || 0;
                        totalCostUsd += data.cost.cost_usd || 0;
                        costKnown = true;
                        updateCostDisplay(totalCostUsd, totalPromptTokens, totalCompletionTokens);
                    } else { showCostUnknown(); }
                    stats.textContent = `📊 ${allRows.length} sản phẩm đã trích xuất...`;
                }
                else if (data.type === 'error') {
                    const errorDetail = data.pages ? `trang ${data.pages}` : `batch ${data.batch}`;
                    document.getElementById('progressText').innerHTML += `<div class="batch-error">⚠ Batch ${data.batch} (${errorDetail}): ${data.message}</div>`;
                }
                else if (data.type === 'done') {
                    evtSource.close();
                    document.getElementById('progressFill').style.width = '100%';
                    document.getElementById('progressText').textContent = 'Hoàn tất!';
                    if (data.total_cost) updateCostDisplay(data.total_cost.total_cost_usd, data.total_cost.prompt_tokens, data.total_cost.completion_tokens);
                    else if (!costKnown) showCostUnknown();
                    stats.textContent = `✅ ${allRows.length} sản phẩm đã trích xuất`;
                    btn.disabled = false;
                    btn.innerHTML = '🔍 Trích xuất';
                    if (allRows.length > 0) {
                        document.getElementById('downloadBtn').style.display = 'inline-block';
                        document.getElementById('saveBtn').style.display = 'inline-block';
                    }
                    if (data.record_id) currentRecordId = data.record_id;
                    if (activeTab === 'history') loadHistory();
                }
            };
            evtSource.onerror = () => { evtSource.close(); document.getElementById('progressText').textContent = 'Kết nối bị gián đoạn'; btn.disabled = false; btn.innerHTML = '🔍 Trích xuất'; };
        }

        async function downloadExcel() {
            if (!allRows.length) return;
            const jsonData = JSON.stringify(buildJsonFromTable());
            try {
                const resp = await fetch('/download-excel', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ json_data: jsonData, filename: currentFilename || 'extracted' })
                });
                if (!resp.ok) throw new Error('Download failed');
                const blob = await resp.blob();
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = (currentFilename || 'extracted').replace(/\.[^.]+$/, '') + '_extracted.xlsx';
                a.click();
                URL.revokeObjectURL(url);
            } catch (err) { alert('Tải Excel thất bại: ' + err.message); }
        }

        async function saveEdits() {
            if (!currentRecordId) { alert('Không có bản ghi để lưu. Hãy trích xuất trước.'); return; }
            const jsonData = JSON.stringify(buildJsonFromTable());
            try {
                const resp = await fetch(`/history/${currentRecordId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ json_data: jsonData })
                });
                if (!resp.ok) throw new Error('Save failed');
                const result = await resp.json();
                alert(`Lưu thành công! (${result.product_count} sản phẩm)`);
            } catch (err) { alert('Lưu thất bại: ' + err.message); }
        }

        let activeTab = 'extract';
        function switchTab(tab) {
            activeTab = tab;
            document.querySelectorAll('.tab-btn').forEach((btn, i) => {
                btn.classList.toggle('active', (i === 0 && tab === 'extract') || (i === 1 && tab === 'history'));
            });
            document.getElementById('tabExtract').classList.toggle('active', tab === 'extract');
            document.getElementById('tabHistory').classList.toggle('active', tab === 'history');
            if (tab === 'history') loadHistory();
        }

        async function loadHistory() {
            const list = document.getElementById('historyList');
            try {
                const resp = await fetch('/history');
                if (!resp.ok) throw new Error('API error');
                const records = await resp.json();
                if (!records.length) { list.innerHTML = '<div class="history-empty">Chưa có lịch sử trích xuất nào</div>'; return; }
                list.innerHTML = records.map(r => {
                    const cost = r.total_cost != null ? formatCost(r.total_cost) : 'N/A';
                    return `<div class="history-item" onclick="loadHistoryRecord(${r.id})">
                        <div class="history-item-header">
                            <span class="history-item-filename" title="${escapeHtml(r.filename)}">${escapeHtml(r.filename)}</span>
                            <span class="history-item-time">${escapeHtml(r.created_at || '')}</span>
                        </div>
                        <div class="history-item-meta">
                            <span>📦 ${r.product_count} sản phẩm</span>
                            <span>🤖 ${escapeHtml(r.model_name)}</span>
                            <span>💰 ${cost}</span>
                            <button class="history-action-btn" onclick="event.stopPropagation(); downloadHistoryExcel(${r.id})">⬇ Excel</button>
                            <button class="history-action-btn" style="background:#d93025" onclick="event.stopPropagation(); deleteHistoryRecord(${r.id})">🗑 Xóa</button>
                        </div>
                    </div>`;
                }).join('');
            } catch (err) { list.innerHTML = '<div class="history-empty">Không tải được lịch sử</div>'; }
        }

        async function loadHistoryRecord(id) {
            try {
                const resp = await fetch(`/history/${id}`);
                if (!resp.ok) throw new Error('Not found');
                const record = await resp.json();
                switchTab('extract');

                // Parse JSON data
                let products = [];
                try { products = JSON.parse(record.json_data); } catch(e) { products = []; }
                if (!Array.isArray(products)) products = [];

                const hdrs = FIELDS;
                const rows = products.map(p => hdrs.map(h => String(p[h] || '')));
                renderTable(hdrs, rows);

                document.getElementById('stats').textContent = `📋 ${rows.length} sản phẩm (từ lịch sử: ${escapeHtml(record.filename)})`;
                document.getElementById('downloadBtn').style.display = rows.length > 0 ? 'inline-block' : 'none';
                document.getElementById('saveBtn').style.display = rows.length > 0 ? 'inline-block' : 'none';
                currentRecordId = id;
                document.getElementById('progressArea').style.display = 'none';
                if (record.total_cost != null) updateCostDisplay(record.total_cost, record.prompt_tokens || 0, record.completion_tokens || 0);
                else document.getElementById('costDisplay').style.display = 'none';
            } catch (err) { alert('Không tải được bản ghi lịch sử'); }
        }

        function downloadHistoryExcel(id) { window.open(`/history/${id}/excel`, '_blank'); }

        async function deleteHistoryRecord(id) {
            if (!confirm('Bạn có chắc muốn xóa bản ghi này?')) return;
            try {
                const resp = await fetch(`/history/${id}`, { method: 'DELETE' });
                if (!resp.ok) throw new Error('Delete failed');
                loadHistory();
            } catch (err) { alert('Xóa thất bại: ' + err.message); }
        }
    </script>
</body>
</html>
